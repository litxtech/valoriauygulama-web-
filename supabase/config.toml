# PostgREST: `ops` şeması (ops.app_users, KBS tabloları) REST ile kullanılıyor.
# Hosted projede Dashboard → Settings → Data API → Exposed schemas listesine de `ops` ekleyin;
# aksi halde Accept-Profile: ops istekleri PGRST106 (406) döner.
[api]
schemas = ["public", "graphql_public", "ops"]

# Edge Functions: Gateway JWT doğrulamasını kapat
# React Native / yeni JWT anahtarları nedeniyle platform 401 dönüyordu.
# Bu fonksiyonlar token'ı header/body ile alıp kendi içinde doğruluyor.

[functions.admin-update-user]
verify_jwt = false

[functions.approve-staff-application]
verify_jwt = false

[functions.create-staff]
verify_jwt = false

[functions.update-staff]
verify_jwt = false

# Misafir medya yükleme: body'de app_token ile yetki, JWT zorunlu değil
[functions.upload-message-media]
verify_jwt = false

# Uygulama storage: RN JWT gateway sorunu; Bearer ile fonksiyon içinde doğrulama
[functions.upload-app-storage]
verify_jwt = false

# Sohbet bildirimi: RN'de JWT gateway 401 verebiliyor; fonksiyon conversationId ile alıcıları sınırlar
[functions.notify-conversation-recipients]
verify_jwt = false

# Push bildirimi: RN'de JWT gateway 401 verebiliyor; body'de staffIds/guestIds ile sınırlı
[functions.send-expo-push]
verify_jwt = false

# Yeni feed: müşterilere toplu bildirim (Bearer JWT ile gönderi sahibi doğrulanır)
[functions.notify-guests-new-feed-post]
verify_jwt = false

# Admin bildirimi: RN'de JWT gateway 401 verebiliyor
[functions.notify-admins]
verify_jwt = false

# QR ile açılan sözleşme sayfası: tarayıcıdan anonim erişim (401 önlenir)
[functions.public-contract]
verify_jwt = false

[functions.public-maliye]
verify_jwt = false

[functions.public-complaint]
verify_jwt = false

[functions.public-kitchen-menu-reviews]
verify_jwt = false

[functions.public-kitchen-menu-guest-comments]
verify_jwt = false

[functions.print-contract]
verify_jwt = false

[functions.print-incident-report]
verify_jwt = false

# KBS köprüsü (Railway): KBS_GATEWAY_URL + KBS_GATEWAY_TOKEN; JWT RN'de sorun çıkarırsa false
[functions.ops-proxy]
verify_jwt = false

# KBS otel şifresi: JWT fonksiyon içinde getUser ile doğrulanır (RN invoke + gateway 401 önlenir)
[functions.kbs-admin-credentials]
verify_jwt = false

[functions.kbs-staff-ops]
verify_jwt = false

# Hesap silme: JWT gateway'de RN'de 401 verebiliyor; fonksiyon Bearer + getUser ile doğrular
[functions.delete-user-account]
verify_jwt = false

# DeepSeek çeviri: Bearer ile fonksiyon içinde getUser doğrulaması
[functions.translate-text]
verify_jwt = false

# DeepSeek sözleşme taslağı: Bearer ile fonksiyon içinde getUser + yetki doğrulaması
[functions.generate-managed-contract]
verify_jwt = false

[functions.mux-create-upload]
verify_jwt = false

[functions.mux-webhook]
verify_jwt = false

[functions.mux-sync-upload]
verify_jwt = false

[functions.mux-create-story-upload]
verify_jwt = false

# Stripe Checkout sonrası HTML dönüş (JWT gerekmez — tarayıcı yönlendirmesi)
[functions.payment-return]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.create-payment-request]
