<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Maliye Evrak Merkezi</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1220;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:20px;text-align:center}
    a{color:#93c5fd}
    .box{max-width:420px;font-size:15px;line-height:1.5}
  </style>
  <script>
    (function () {
      var BASE = "https://sbydlcujsiqmifybqzsi.supabase.co/functions/v1/public-maliye";
      var p = new URLSearchParams(window.location.search);
      if (!p.get("token") && !p.get("t")) {
        p.set("token", "valoria-maliye-qr");
      }
      var target = BASE + "?" + p.toString();
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="box">
    <p>Maliye portalina yonlendiriliyorsunuz…</p>
    <p><a id="link" href="#">Buraya tiklayin</a></p>
  </div>
  <script>
    (function () {
      var BASE = "https://sbydlcujsiqmifybqzsi.supabase.co/functions/v1/public-maliye";
      var p = new URLSearchParams(window.location.search);
      if (!p.get("token") && !p.get("t")) p.set("token", "valoria-maliye-qr");
      var u = BASE + "?" + p.toString();
      var a = document.getElementById("link");
      if (a) a.href = u;
    })();
  </script>
</body>
</html>
