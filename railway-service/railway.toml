# Railway: Root Directory = railway-service (monorepo kökünden deploy ediyorsanız)
[build]
builder = "NIXPACKS"
buildCommand = "npm install --no-audit --no-fund && npm run build"

[deploy]
startCommand = "node dist/app/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
